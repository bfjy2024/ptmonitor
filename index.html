<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>2026开放注册PT站点</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6f9fc;font-family:Inter,sans-serif;padding:2rem 1.5rem;color:#0b1a2f}.container{max-width:1400px;margin:0 auto}.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:2.5rem;gap:1rem}.header-left{display:flex;align-items:center;gap:12px}.header-left h1{font-weight:700;font-size:1.9rem;background:linear-gradient(145deg,#0b2b4a,#1a4b6d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.badge-count{background:#d3e5f7;color:#1a4b6d;font-weight:600;font-size:.9rem;padding:.25rem 1rem;border-radius:40px}.update-time{color:#3b5f7a;background:#e9f0f7;padding:.3rem 1.2rem;border-radius:40px;font-size:.85rem;font-weight:500}.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.8rem}.card{background:#fff;border-radius:28px;padding:1.6rem 1.4rem;box-shadow:0 12px 28px -8px rgba(0,20,40,0.08);border:1px solid rgba(220,235,250,0.5);display:flex;flex-direction:column}.card:hover{transform:translateY(-5px);box-shadow:0 24px 40px -16px rgba(18,52,86,0.15);border-color:#b6d4e8}.card-header{display:flex;align-items:center;gap:14px;margin-bottom:.9rem}.logo-wrapper{flex-shrink:0;width:54px;height:54px;border-radius:16px;background:#f0f5fa;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(200,215,230,0.3)}.logo-wrapper img{width:100%;height:100%;object-fit:contain;padding:4px;background:#fff}.site-name{font-weight:700;font-size:1.1rem;color:#0b2b4a}.site-domain{font-size:.75rem;color:#4f7390;opacity:.8}.tags{display:flex;flex-wrap:wrap;gap:8px;margin:.6rem 0 1rem}.tag{font-size:.7rem;font-weight:600;padding:.2rem .9rem;border-radius:40px;background:#eef3f8;color:#1c4b6a;border:1px solid rgba(160,190,215,0.2)}.tag-engine{background:#e3eaf2;color:#1a4058}.tag-register{background:#d9f0e1;color:#0d5430;border-color:#b0d9c4}.register-link{margin-top:auto;padding-top:1rem;border-top:1px solid #e5edf5;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.register-btn{display:inline-flex;align-items:center;gap:8px;background:#1b5c8c;color:#fff;font-weight:600;font-size:.8rem;padding:.45rem 1.2rem;border-radius:60px;text-decoration:none}.register-btn:hover{background:#0f4a73;transform:scale(.97)}.footer{margin-top:3rem;text-align:center;font-size:.9rem;color:#3b5f7a;border-top:1px solid #dae6f0;padding-top:1.8rem}.footer a{color:#1a5a7a;text-decoration:none;font-weight:600}@media(max-width:640px){body{padding:1.2rem .8rem}.card-grid{grid-template-columns:1fr}}
</style></head>
<body><div class="container"><div class="header"><div class="header-left"><h1>2026开放注册PT站点</h1><span class="badge-count">1 个站点</span></div><div class="update-time">2026-6</div></div><div class="card-grid" id="siteGrid"></div><div class="footer">powered by <a href="https://bfjy2024.github.io/bfjy" target="_blank">bfjy2024</a></div></div>
<script>const sites=[
  {
    "name": "LP-Bits.com 2.0",
    "domain": "lp-bits.com",
    "logo": "https://lp-bits.com/favicon.ico",
    "engine": "nexusphp",
    "registerUrl": "https://lp-bits.com/signup.php",
    "invite": "开放邀请",
    "inviteType": "open"
  }
];const grid=document.getElementById('siteGrid');if(grid){grid.innerHTML=sites.map(s=>`<div class="card"><div class="card-header"><div class="logo-wrapper"><img src="${s.logo}" alt="${s.name}" loading="lazy" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\"font-size:1.2rem;font-weight:700;color:#1a4b6d\">${s.name.charAt(0)}</span>'"></div><div><div class="site-name">${s.name}</div><div class="site-domain">${s.domain}</div></div></div><div class="tags"><span class="tag tag-engine">${s.engine}</span><span class="tag tag-register">✅ 开放注册</span></div><div class="register-link"><a href="${s.registerUrl}" target="_blank" class="register-btn"><span>📋 注册页</span><span>→</span></a></div></div>`).join('')}</script></body></html>
